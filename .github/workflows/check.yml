name: Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: nix flake check
        run: nix flake check

      - name: nix build (agent-host toplevel)
        run: nix build .#nixosConfigurations.agent-host.config.system.build.toplevel --no-link

      - name: nix fmt check
        run: nix fmt -- --ci

      - uses: actions/setup-go@v6
        with:
          go-version-file: pkgs/hermes-auditd/go.mod
          cache-dependency-path: pkgs/hermes-auditd/go.sum

      - name: go build
        run: cd pkgs/hermes-auditd && go build ./...

      - name: go vet
        run: cd pkgs/hermes-auditd && go vet ./...

      - name: go test
        run: cd pkgs/hermes-auditd && go test ./...

      - name: shellcheck
        run: shellcheck installer/*.sh scripts/*.sh
